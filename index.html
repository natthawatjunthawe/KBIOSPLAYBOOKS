<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>KBIOS PLAY BOOKS</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><style>body,html{margin:0;padding:0;height:100%;overflow:hidden}#ldr{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;justify-content:center;align-items:center;transition:opacity .4s}.spn{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #2563eb;border-radius:50%;animation:sp 1s linear infinite}@keyframes sp{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}.CodeMirror{height:100%;font-size:15px;font-family:monospace}#pdf-mode canvas{max-width:100%;max-height:85vh;object-fit:contain;box-shadow:0 10px 25px rgba(0,0,0,0.5)}</style></head><body class="bg-gray-50 flex flex-col h-full font-sans antialiased"><div id="ldr"><div class="flex flex-col items-center"><div class="spn mb-4"></div><h1 class="text-xl font-bold text-gray-800 tracking-wider">KBIOS PLAY BOOKS</h1></div></div><header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between z-10 sticky top-0"><div class="flex items-center gap-3"><img src="ใส่ลิงค์โลโก้ของคุณที่นี่" alt="Logo" class="h-10 w-10 object-contain rounded"><h1 class="text-2xl font-black text-gray-900 tracking-tight">KBIOS<span class="text-blue-600 font-medium ml-1">PLAY BOOKS</span></h1></div><div class="flex-1 max-w-2xl mx-8 relative"><i class="fa-solid fa-search absolute left-4 top-3 text-gray-400"></i><input type="text" id="sch" placeholder="Search files..." class="w-full bg-gray-100 rounded-full py-2.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium transition-all"></div><div class="flex gap-4"><label class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full cursor-pointer transition-all font-bold shadow-md hover:shadow-lg text-sm flex items-center">Upload<input type="file" id="upf" class="hidden"></label></div></header><main class="flex-1 overflow-y-auto p-8"><div id="grd" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6"></div></main><div id="edm" class="fixed inset-0 bg-gray-900 z-40 hidden flex-col transition-all"><header class="bg-gray-950 text-white px-4 py-3 flex justify-between items-center shadow-lg border-b border-gray-800"><div class="flex items-center gap-4"><button id="bcl" class="text-gray-400 hover:text-white w-10 h-10 rounded-full hover:bg-gray-800 flex items-center justify-center"><i class="fa-solid fa-xmark text-xl"></i></button><input type="text" id="efn" class="bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-1.5 focus:outline-none focus:border-blue-500 w-72 font-medium text-sm"></div><div class="flex gap-3"><button id="bsv" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-lg font-bold text-sm shadow-lg"><i class="fa-solid fa-floppy-disk mr-2"></i>Save</button><button id="bex" class="bg-green-600 hover:bg-green-500 px-5 py-2 rounded-lg font-bold text-sm shadow-lg"><i class="fa-solid fa-file-export mr-2"></i>Export</button></div></header><div id="edc" class="flex-1 relative bg-white"></div></div><div id="pdf-mode" class="fixed inset-0 bg-black z-50 hidden flex-col"><div class="flex justify-between items-center p-4 bg-gray-900 text-white"><button onclick="closePdf()" class="text-white hover:text-blue-400"><i class="fa-solid fa-arrow-left text-2xl"></i></button><span id="pdf-page-num" class="font-bold">Page 1</span><button onclick="downloadPdfPage()" class="bg-blue-600 px-4 py-2 rounded font-bold"><i class="fa-solid fa-download"></i> Save Page</button></div><div class="flex-1 flex items-center justify-center relative overflow-hidden" id="pdf-container"><button onclick="prevPage()" class="absolute left-4 z-10 bg-white/20 p-4 rounded-full text-white hover:bg-white/40"><i class="fa-solid fa-chevron-left"></i></button><canvas id="pdf-render"></canvas><button onclick="nextPage()" class="absolute right-4 z-10 bg-white/20 p-4 rounded-full text-white hover:bg-white/40"><i class="fa-solid fa-chevron-right"></i></button></div></div><script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';let db=[],cf=null,ed=null,pdfDoc=null,pageNum=1,pageIsRendering=false,pageNumIsPending=null;const g=document.getElementById("grd"),m=document.getElementById("edm"),c=document.getElementById("edc"),n=document.getElementById("efn");window.addEventListener("load",async()=>{localforage.config({name:'kbios_books'});setTimeout(()=>{document.getElementById("ldr").style.opacity="0";setTimeout(()=>document.getElementById("ldr").style.display="none",400)},800);const d=await localforage.getItem("kbk");if(d)db=d;rd()});async function sv(){try{await localforage.setItem("kbk",db)}catch(e){Swal.fire("Error","Storage Error","error")}}function rd(f=db){g.innerHTML="";f.forEach(x=>{const e=document.createElement("div");e.className="bg-white p-5 rounded-2xl shadow-sm hover:shadow-xl transition-all flex flex-col items-center gap-4 border border-gray-100 group relative";e.innerHTML=`<button onclick="del('${x.id}', event)" class="absolute top-2 right-2 text-red-500 hover:text-red-700 bg-red-50 w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button><div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center group-hover:bg-blue-50 transition cursor-pointer" onclick="op('${x.id}')"><i class="fa-solid ${gi(x.n)} text-4xl text-blue-500 group-hover:scale-110 transition"></i></div><span class="text-sm font-bold text-gray-700 text-center w-full truncate px-2 cursor-pointer" onclick="op('${x.id}')">${x.n}</span>`;g.appendChild(e)})}function gi(x){return x.endsWith(".pdf")?"fa-file-pdf":x.match(/\.(js|html|css|json|txt|md)$/)?"fa-file-code":"fa-file"}document.getElementById("upf").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{db.push({id:Date.now().toString(),n:f.name,t:f.type,d:ev.target.result});await sv();rd()};r.readAsDataURL(f)});document.getElementById("sch").addEventListener("input",e=>{const v=e.target.value.toLowerCase();rd(db.filter(x=>x.n.toLowerCase().includes(v)))});async function op(id){cf=db.find(x=>x.id===id);if(cf.n.endsWith(".pdf")){openPdf(cf.d);return}n.value=cf.n;m.classList.remove("hidden");m.classList.add("flex");c.innerHTML="";if(cf.t.includes("image")||cf.t.includes("video")){c.innerHTML=`<iframe src="${cf.d}" class="w-full h-full border-0 bg-gray-100"></iframe>`}else{const t=document.createElement("textarea");c.appendChild(t);let tx="";try{tx=decodeURIComponent(escape(atob(cf.d.split(",")[1])))}catch(e){tx=cf.d}ed=CodeMirror.fromTextArea(t,{lineNumbers:true,theme:"dracula",mode:"javascript",lineWrapping:true});ed.setValue(tx)}}async function del(id,e){e.stopPropagation();const r=await Swal.fire({title:"Delete?",icon:"warning",showCancelButton:true});if(r.isConfirmed){db=db.filter(x=>x.id!==id);await sv();rd()}}document.getElementById("bcl").onclick=()=>{if(ed){Swal.fire({title:"Unsaved?",icon:"warning",showCancelButton:true,confirmButtonText:"Edit",cancelButtonText:"Discard"}).then(r=>{if(!r.isConfirmed)cl()})}else cl()};function cl(){m.classList.add("hidden");m.classList.remove("flex");ed=null;cf=null;rd()}document.getElementById("bsv").onclick=async()=>{if(!cf)return;cf.n=n.value;if(ed){cf.d="data:text/plain;base64,"+btoa(unescape(encodeURIComponent(ed.getValue())))}await sv();Swal.fire({icon:"success",title:"Saved",toast:true,position:"top-end",showConfirmButton:false,timer:2000})};document.getElementById("bex").onclick=()=>{if(!cf)return;const a=document.createElement("a");a.href=cf.d;a.download=n.value;a.click()};function openPdf(d){document.getElementById('pdf-mode').classList.remove('hidden');document.getElementById('pdf-mode').classList.add('flex');const loadingTask=pdfjsLib.getDocument(d);loadingTask.promise.then(p=>{pdfDoc=p;pageNum=1;renderPage(pageNum)})}function renderPage(n){pageIsRendering=true;pdfDoc.getPage(n).then(p=>{const cv=document.getElementById('pdf-render');const ctx=cv.getContext('2d');const viewport=p.getViewport({scale:2.0});cv.height=viewport.height;cv.width=viewport.width;p.render({canvasContext:ctx,viewport:viewport}).promise.then(()=>{pageIsRendering=false;if(pageNumIsPending!==null){renderPage(pageNumIsPending);pageNumIsPending=null}});document.getElementById('pdf-page-num').textContent=`Page ${n} of ${pdfDoc.numPages}`})}function queueRenderPage(n){if(pageIsRendering)pageNumIsPending=n;else renderPage(n)}function prevPage(){if(pageNum<=1)return;pageNum--;queueRenderPage(pageNum)}function nextPage(){if(pageNum>=pdfDoc.numPages)return;pageNum++;queueRenderPage(pageNum)}function closePdf(){document.getElementById('pdf-mode').classList.add('hidden');document.getElementById('pdf-mode').classList.remove('flex');pdfDoc=null}function downloadPdfPage(){const cv=document.getElementById('pdf-render');const a=document.createElement("a");a.href=cv.toDataURL("image/jpeg",0.9);a.download=`Page_${pageNum}.jpg`;a.click()}let tx=0;document.getElementById('pdf-container').addEventListener('touchstart',e=>tx=e.changedTouches[0].screenX);document.getElementById('pdf-container').addEventListener('touchend',e=>{let dx=e.changedTouches[0].screenX-tx;if(dx<-50)nextPage();if(dx>50)prevPage()});</script></body></html>
